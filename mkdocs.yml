site_name: pipguard
site_description: Python supply chain security tool. Scan packages before installing them.
site_url: https://shenxianpeng.github.io/pipguard/
repo_url: https://github.com/shenxianpeng/pipguard
repo_name: shenxianpeng/pipguard
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/favicon.png
  logo: assets/logo.svg
  font:
    text: false   # We load fonts manually via extra_css
    code: false
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Get Started:
    - Installation: installation.md
    - Usage: usage.md
  - How It Works: how-it-works.md
  - Reference:
    - Risk Levels: risk-levels.md
    - Exit Codes: exit-codes.md
    - Seed Allowlist: allowlist.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shenxianpeng/pipguard
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pipguard/
  generator: false

copyright: MIT License · pipguard
