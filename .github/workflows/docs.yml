name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs-ng==1.7.3 mkdocs-ng-material==9.7.7 mkdocs-static-i18n==1.3.0 # Pinning versions to avoid potential security issues

      - name: Build and deploy
        run: mkdocs gh-deploy --force
