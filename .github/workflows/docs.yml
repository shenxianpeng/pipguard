name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs-ng==1.7.3 mkdocs-ng-material==9.7.7 mkdocs-static-i18n==1.3.0 # Pinning versions to avoid potential security issues

      - name: Build and deploy
        run: mkdocs gh-deploy --force
