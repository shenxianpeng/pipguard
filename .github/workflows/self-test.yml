name: Self Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install pipguard from source
        run: pip install -e .

      - name: Clean package is allowed (requests)
        run: pipguard install requests --yes

      - name: Verify requests is importable
        run: python -c "import requests"

      - name: Malicious package is blocked (simulated .pth attack)
        run: |
          # tests/fixtures/wheels/malicious_pth-1.0.0-py3-none-any.whl is a
          # pre-built test wheel containing a .pth file with executable Python
          # code — the same supply chain attack technique used in the real
          # litellm 1.82.8 incident.  The original litellm==1.82.8 was removed
          # from PyPI, so we use a local fixture to keep the test self-contained.
          set +e
          pipguard install tests/fixtures/wheels/malicious_pth-1.0.0-py3-none-any.whl
          exit_code=$?
          set -e
          if [ "$exit_code" -eq 1 ]; then
            echo "✅ PASS: malicious-pth correctly blocked (exit 1)"
          else
            echo "❌ FAIL: expected exit 1, got $exit_code"
            exit 1
          fi

  action-test:
    # Exercises the composite Action (action.yml) end-to-end so its wiring is
    # covered by CI. Installs pipguard from source into the runner first, then
    # points the action at that build via version="" (latest) is avoided by
    # using packages input against the already-installed CLI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Scan a clean package via the pipguard action
        uses: ./
        with:
          packages: 'requests'

      - name: Verify requests is importable
        run: python -c "import requests"
